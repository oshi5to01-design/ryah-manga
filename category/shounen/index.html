  <meta property="og:image" content="https://ryah-manga.com/img/og-default.jpg">

</head>
<body>

<site-header></site-header>

<nav class="breadcrumb" aria-label="パンくずリスト">
  <a href="/">ホーム</a>
  <span class="breadcrumb-sep">›</span>
  <a href="/reviews/">レビュー一覧</a>
  <span class="breadcrumb-sep">›</span>
  <span class="breadcrumb-current">少年マンガ</span>
</nav>

<div class="section-head">
  <span class="section-kicker">Shounen</span>
  <h1 class="section-title">少年マンガ</h1>
  <span class="section-count" id="review-count"></span>
</div>

<div class="reviews-grid" id="category-reviews"></div>

<p id="no-results" style="display:none;padding:3rem var(--gutter);text-align:center;font-family:var(--font-mono);font-size:0.8rem;color:var(--color-text-muted);letter-spacing:0.1em;">
  まだ少年マンガのレビューがありません。
</p>

<site-footer></site-footer>

<script src="/js/components.js?v=3"></script>
<script src="/js/reviews-index.js?v=3"></script>
<script>
  const filtered = REVIEWS.filter(r => r.genre.includes('shounen'));
  document.getElementById('review-count').textContent = String(filtered.length).padStart(2, '0') + ' reviews';
  if (filtered.length) {
    renderEditorialGrid('category-reviews', filtered);
  } else {
    document.getElementById('category-reviews').style.display = 'none';
    document.getElementById('no-results').style.display = 'block';
  }
</script>

</body>
</html>
