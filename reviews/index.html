  <link rel="canonical" href="https://ryah-manga.com/reviews/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="マンガレビュー一覧 — りゃーのマンガ感想">
  <meta property="og:description" content="2000冊以上読んだりゃーによるマンガレビュー一覧。">

  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <link rel="alternate icon" href="/img/favicon-32.png">

  <link rel="stylesheet" href="/css/style.css?v=5">
  <link rel="stylesheet" href="/css/components.css?v=5">
  <link rel="stylesheet" href="/css/enhancements.css?v=5">
  <style>
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0 var(--gutter) 1rem;
    }
    .filter-btn {
      padding: 0.4rem 1rem;
      border: 1px solid var(--color-border-light);
      font-size: 0.78rem;
      color: var(--color-text-dim);
      cursor: pointer;
      font-family: var(--font-sans);
      background: transparent;
      transition: all var(--transition);
    }
    .filter-btn:hover { border-color: var(--color-accent); color: var(--color-text); }
    .filter-btn.active {
      background: var(--color-accent);
      color: #fff;
      border-color: var(--color-accent);
    }
    .filter-btn--completed { border-color: rgba(102,187,106,0.3); color: #66bb6a; }
    .filter-btn--ongoing { border-color: rgba(100,181,246,0.3); color: #64b5f6; }
    .empty-state {
      padding: 3rem var(--gutter);
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--color-text-muted);
      letter-spacing: 0.1em;
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-1CHY4ZF6W1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-1CHY4ZF6W1');
  </script>
</head>
<body>

<site-header></site-header>

<nav class="breadcrumb" aria-label="パンくずリスト">
  <a href="/">ホーム</a>
  <span class="breadcrumb-sep">›</span>
  <span class="breadcrumb-current">レビュー一覧</span>
</nav>

<div class="section-head">
  <span class="section-kicker">All Reviews</span>
  <h1 class="section-title">マンガレビュー一覧</h1>
  <span class="section-count" id="review-count"></span>
</div>

<div class="filter-bar" role="group" aria-label="ジャンルで絞り込み">
  <button class="filter-btn active" data-filter="all">すべて</button>
  <button class="filter-btn" data-filter="shounen">少年</button>
  <button class="filter-btn" data-filter="shoujo">少女</button>
  <button class="filter-btn" data-filter="seinen">青年</button>
  <button class="filter-btn" data-filter="josei">女性</button>
  <button class="filter-btn" data-filter="isekai">異世界</button>
  <button class="filter-btn filter-btn--completed" data-filter="completed">✓ 完結</button>
  <button class="filter-btn filter-btn--ongoing" data-filter="ongoing">▶ 連載中</button>
</div>

<div class="reviews-grid" id="all-reviews"></div>

<p id="no-results" class="empty-state" style="display:none;">該当するレビューがありません。</p>

<site-footer></site-footer>

<script src="/js/components.js?v=5"></script>
<script src="/js/reviews-index.js?v=5"></script>
<script>
  let currentFilter = 'all';

  function applyFilter(filter) {
    currentFilter = filter;
    const filtered = filter === 'all'
      ? REVIEWS
      : (filter === 'completed' || filter === 'ongoing')
        ? REVIEWS.filter(r => r.status === filter)
        : REVIEWS.filter(r => r.genre.includes(filter));

    if (filtered.length) {
      renderEditorialGrid('all-reviews', filtered);
    } else {
      document.getElementById('all-reviews').innerHTML = '';
    }
    document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';
    document.getElementById('all-reviews').style.display = filtered.length ? 'grid' : 'none';

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === filter);
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => applyFilter(btn.dataset.filter));
  });

  document.getElementById('review-count').textContent = String(REVIEWS.length).padStart(2, '0') + ' reviews';
  applyFilter('all');
</script>

</body>
</html>
